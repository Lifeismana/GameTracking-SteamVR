name: Update

on:
    workflow_dispatch:
        inputs:
            branch:
                description: 'Steam VR Branch'
                required: false
                default: 'beta'
                type: string
    repository_dispatch:

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: true

jobs:
    execute:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        environment: Execute
        steps:

        - name: Checkout GameTracking
          uses: actions/checkout@v6
          with:
            submodules: recursive
            fetch-depth: 1
            repository: 'Lifeismana/GameTracking'


        - name: Checkout GameTrackingSteamVR
          uses: actions/checkout@v6
          with:
            submodules: recursive
            fetch-depth: 1
            path: steamvr

        - name: Setup PHP
          uses: shivammathur/setup-php@v2
          with:
            php-version: '8.5'

        - name: Setup Go
          uses: actions/setup-go@v6
          with:
            go-version: 'stable'

        - name: Setup .NET
          uses: actions/setup-dotnet@v5
          with:
            dotnet-version: '10.x'

        - name: Build tools
          run: |
            sed -i 's/git submodule update --remote --merge/git submodule update --init --remote --depth 1/' tools/build.sh && \
            ./tools/build.sh

        - name: Build DepotDownloader
          run: |
            cd $RUNNER_TEMP && \
            git clone --depth=1 https://github.com/SteamTracking/SteamFileDownloader.git && \
            cd SteamFileDownloader && \
            dotnet build -c Release SteamFileDownloader.csproj && \
            dotnet publish --configuration Release -p:PublishSingleFile=true -p:DebugType=embedded --self-contained --runtime linux-x64 SteamFileDownloader.csproj && \
            mv ./bin/linux-x64/publish/SteamFileDownloader /usr/local/bin/SteamFileDownloader

        - name: Configure git user
          run: |
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        - name: git exclude # TODO : remove once i switch
          run: |
            echo ".DepotDownloader" >> ~/.gitignore && \
            git config --global core.excludesfile ~/.gitignore

        - name: Setup Node.js
          uses: actions/setup-node@v6
          with:
            node-version: '22'
            cache: 'npm'
            cache-dependency-path: steamvr/package-lock.json

        - name: Install Node dependencies
          working-directory: steamvr
          run: npm ci

        - name: Execute
          working-directory: steamvr
          run: |
            mkdir -p ./manifests

            [ -z "$STEAM_BRANCH" ] && STEAM_BRANCH="beta"

            SteamFileDownloader --username "$STEAM_USERNAME" --password "$STEAM_PASSWORD" --appid 250820 --output . --branch $STEAM_BRANCH --save-manifest

            ./update.sh $STEAM_BRANCH
          env:
                STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
                STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
                STEAM_BRANCH: ${{ github.event.inputs.branch }}
