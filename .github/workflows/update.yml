name: Update

on:
    workflow_dispatch:
        inputs:
            branch:
                description: 'Steam VR Branch'
                required: false
                default: 'beta'
                type: string
    repository_dispatch:

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: true

jobs:
    execute:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        environment: Execute
        steps:

        - name: Setup PHP
          uses: shivammathur/setup-php@v2
          with:
            php-version: '8.5'

        - name: Setup Go
          uses: actions/setup-go@v6
          with:
            go-version: 'stable'

        - name: Setup .NET
          uses: actions/setup-dotnet@v5
          with:
            dotnet-version: '10.x'

        # - name: Install Node dependencies
        #   run: npm ci
          
        - name: Checkout
          uses: actions/checkout@v6
          with:
            submodules: recursive
            fetch-depth: 1
            repository: 'Lifeismana/GameTracking'
        
        - name: Build tools
          run: ./tools/build.sh

        - name: Build DepotDownloader
          run: |
            mkdir -p /data && \
            cd /data && \
            git clone --depth=1 https://github.com/SteamRE/DepotDownloader.git && \
            cd DepotDownloader && \
            dotnet build -c Release ./DepotDownloader/DepotDownloader.csproj && \
            dotnet publish --configuration Release -p:PublishSingleFile=true -p:DebugType=embedded --self-contained --runtime linux-x64 DepotDownloader/DepotDownloader.csproj && \
            mv ./DepotDownloader/bin/Release/net9.0/linux-x64/publish/DepotDownloader /data/DepotDownloader

        - name: Configure git user
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        - name: git exclude # TODO : remove once i switch
          run: |
            echo ".DepotDownloader" >> ~/.gitignore && \
            git config --global core.excludesfile ~/.gitignore && \

        - name: Checkout
          uses: actions/checkout@v6
          with:
            submodules: recursive
            fetch-depth: 1
            path: $GITHUB_WORKSPACE/steamvr

        - name: Setup Node.js
          uses: actions/setup-node@v6
          with:
            node-version: '22'
            cache: 'npm'

        - name: Execute
          run: |
            cd steamvr

            mkdir -p ./manifests

            [ -z "$STEAM_BRANCH" ] && STEAM_BRANCH="beta"

            # 817940
            /data/DepotDownloader -username "$STEAM_USERNAME" -password "$STEAM_PASSWORD" -app 250820 -depot 228985 228988 228989 228990 250821 250822 250823 250824 250825 250827 250828 250829 250830 250831 250832 250833 250834 4128110 -all-platforms -dir ./manifests -beta $STEAM_BRANCH -manifest-only
            shopt -s extglob
            for file in ./manifests/*_*_*.txt; do
                mv $file ${file%_+([0-9]).txt}.txt
            done
            /data/DepotDownloader -username "$STEAM_USERNAME" -password "$STEAM_PASSWORD" -app 250820 -all-platforms -depot 250821 -validate -dir . -beta $STEAM_BRANCH -filelist "$GITHUB_WORKSPACE/steamvr/list/dll.txt"
            /data/DepotDownloader -username "$STEAM_USERNAME" -password "$STEAM_PASSWORD" -app 250820 -all-platforms -depot 250823 250832 -validate -dir . -beta $STEAM_BRANCH -filelist "$GITHUB_WORKSPACE/steamvr/list/lib.txt"
            /data/DepotDownloader -username "$STEAM_USERNAME" -password "$STEAM_PASSWORD" -app 250820 -all-platforms -depot 250824 -validate -dir . -beta $STEAM_BRANCH -filelist "$GITHUB_WORKSPACE/steamvr/list/big_content.txt"
            /data/DepotDownloader -username "$STEAM_USERNAME" -password "$STEAM_PASSWORD" -app 250820 -all-platforms -depot 250827 250830 250833 -validate -dir . -beta $STEAM_BRANCH -filelist "$GITHUB_WORKSPACE/steamvr/list/content.txt"
            /data/DepotDownloader -username "$STEAM_USERNAME" -password "$STEAM_PASSWORD" -app 250820 -all-platforms -depot 250834 4128110 -validate -dir . -beta $STEAM_BRANCH 
            /data/DepotDownloader -app 250820 -all-platforms -depot 250825 -dir . -beta $STEAM_BRANCH
            npm install

            ./update.sh $STEAM_BRANCH