syntax = "proto3";
import "attr_value.proto";
import "op_def.proto";

package opencv_tensorflow;

option cc_enable_arenas = true;
option java_package = "org.tensorflow.framework";
option java_outer_classname = "FunctionProtos";
option java_multiple_files = true;

message FunctionDefLibrary {
	repeated .opencv_tensorflow.FunctionDef function = 1;
	repeated .opencv_tensorflow.GradientDef gradient = 2;
}

message FunctionDef {
	message Node {
		message AttrEntry {
			optional string key = 1;
			optional .opencv_tensorflow.AttrValue value = 2;
		}

		repeated string ret = 1;
		optional string op = 2;
		repeated string arg = 3;
		repeated string dep = 4;
		repeated .opencv_tensorflow.FunctionDef.Node.AttrEntry attr = 5;
	}

	optional .opencv_tensorflow.OpDef signature = 1;
	repeated .opencv_tensorflow.FunctionDef.Node node = 2;
}

message GradientDef {
	optional string function_name = 1;
	optional string gradient_func = 2;
}
