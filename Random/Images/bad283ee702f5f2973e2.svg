<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="buttonGradient">
      <stop offset="0%" stop-color="var(--bordercolor)" stop-opacity="1"/>
      <stop offset="100%" stop-color="var(--bordercolor)" stop-opacity="0"/>
    </radialGradient>
    <filter id="background" x="-10%" y="-10%" width="120%" height="120%">
      <feFlood flood-color="#1d4e62e0"/>
      <feComposite in="SourceGraphic"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2 2" result="shadow"/>
      <feOffset dx="1" dy="1"/>
    </filter>
  </defs>
  <text text-anchor="" filter="url(#shadow)" x="" y="" style=""/>
  <text text-anchor="" filter="url(#background)" x="" y="" style=""/>
  <circle id="SourceCircle" cx="" cy="" r="0.5rem" fill="url(#buttonGradient)"/>
</svg>
